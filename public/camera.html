<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamera Modu - PhoneCam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <div class="container camera-layout">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Geri Dön
    </a>

    <div class="camera-card glass-card">
      <div class="camera-stream-wrapper">
        <video id="camera-video" autoplay playsinline muted></video>
        
        <!-- Bağlantı Durum Göstergesi -->
        <div id="status-badge" class="status-overlay">
          <span class="status-dot"></span>
          <span id="status-text">Kamera Bekleniyor</span>
        </div>
      </div>

      <div class="camera-controls">
        <div class="input-group">
          <label for="device-name">Kamera (Cihaz) Adı</label>
          <input type="text" id="device-name" class="input-style" placeholder="Örn: Salon Kamerası" value="">
        </div>

        <div class="btn-group">
          <button id="toggle-camera-btn" class="btn btn-secondary" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            Kamerayı Çevir
          </button>
          
          <button id="start-btn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Yayını Başlat
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bağımlılıklar -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/camera.js"></script>
</body>
</html>
